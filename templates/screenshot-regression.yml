# Screenshot regression workflow — copy to .github/workflows/ in your project.
#
# On a visual regression the suite FAILS (stays red) and uploads the proposed
# screenshot + visual diff as a build artifact so you can see what changed. The
# baseline is never auto-overwritten, so a regression can't silently heal green.
#
# To ACCEPT an intentional change in one click, use the companion
# screenshot-accept.yml workflow (add the `accept-screenshots` label to the PR).
#
# Pin `gleam-version` / `otp-version` to match your project.

name: screenshots

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1.2"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Installs the JS peer deps the library shells out to: `odiff-bin` (the
      # diff binary) and `linkedom` (template injection). Make sure both are in
      # your package.json devDependencies.
      - run: npm ci

      - run: gleam deps download

      - run: gleam format --check src test

      # A real Chrome for the headless screenshots. Pin a version so renders
      # stay deterministic across runs.
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: "131.0.6778.204"

      # --- Project-specific: build any assets your screenshot template links ---
      # The template's <link rel="stylesheet"> must resolve on disk. For a
      # Lustre + Tailwind project that's typically:
      #   - run: gleam run -m lustre/dev build --outdir=priv/static
      # For an htmx project, build/copy your CSS to where the template expects.

      - name: Run tests (incl. screenshot regression)
        run: gleam test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          ODIFF_BIN: node_modules/.bin/odiff

      # On failure, surface the proposed screenshots + diffs for review. The
      # build stays red; nothing is pushed back to the branch.
      - name: Upload proposed screenshots and diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-proposals
          path: |
            **/*.new.png
            **/*.diff.png
          if-no-files-found: ignore
          retention-days: 14
