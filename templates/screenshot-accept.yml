# One-click screenshot accept — copy to .github/workflows/ in your project.
#
# When a screenshot change is intentional, accepting it is a single click:
# add the `accept-screenshots` label to the PR (create the label once in your
# repo). This workflow then re-renders every view in accept mode, commits the
# refreshed baselines to the PR branch, and removes the label — the next
# screenshots run goes green. You can also trigger it manually from the Actions
# tab ("Run workflow").
#
# It refreshes baselines for THIS workflow's platform (Linux). Commit other
# platforms' baselines (e.g. macOS) by running `SCREENSHOT_ACCEPT=true gleam
# test` locally there.

name: accept-screenshots

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  accept:
    # Only run for the label trigger when it's the right label.
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'accept-screenshots'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push refreshed baselines
      pull-requests: write # remove the label afterwards
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR's head branch so we can push the baselines back.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1.2"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci
      - run: gleam deps download

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: "131.0.6778.204"

      # --- Project-specific: build the same assets as screenshot-regression.yml ---
      #   - run: gleam run -m lustre/dev build --outdir=priv/static

      # Accept mode: adopt the current render as every baseline; the suite passes.
      - name: Refresh baselines
        run: gleam test
        env:
          SCREENSHOT_ACCEPT: "true"
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          ODIFF_BIN: node_modules/.bin/odiff

      - name: Commit refreshed baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No baseline changes to accept."
          else
            git commit -m "Accept updated screenshots"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Remove the accept-screenshots label
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'accept-screenshots',
            }).catch(() => {});
