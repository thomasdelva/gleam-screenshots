# One-click accept for this library's own baselines. Add the
# `accept-screenshots` label to a PR (or run manually) to refresh the committed
# Linux baselines in test/screenshots/ and push them back to the branch.

name: accept-screenshots

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  accept:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'accept-screenshots'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1.2"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci
      - run: gleam deps download

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: "131.0.6778.204"

      - name: Refresh baselines
        run: gleam test
        env:
          SCREENSHOT_ACCEPT: "true"
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          ODIFF_BIN: node_modules/.bin/odiff

      - name: Commit refreshed baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No baseline changes to accept."
          else
            git commit -m "Accept updated screenshots"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Remove the accept-screenshots label
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'accept-screenshots',
            }).catch(() => {});
