# This repo's own CI: one job that runs the format check and the screenshot suite
# (render the fixtures, pixel-diff against committed baselines) on both targets
# (Erlang + JavaScript) — the library's dual-target proof. There's no reusable
# workflow to call; consumers write their own job like the one below and run
# `gleam test`.
#
# Accepting is folded into the same job: while the `accept-screenshots` label is
# on the PR, the runs go into SCREENSHOT_ACCEPT mode (the library refreshes any
# baseline that drifted past the threshold) and the commit step pushes the result
# back. The label stays until removed, so every push keeps adopting.

name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  gleam:
    runs-on: ubuntu-latest
    permissions:
      contents: write # accept mode pushes the refreshed baselines
    env:
      # Accept mode (refresh the baselines) whenever the label is on the PR;
      # otherwise the runs are the compare. Shared by both target steps.
      SCREENSHOT_ACCEPT: ${{ contains(github.event.pull_request.labels.*.name, 'accept-screenshots') }}
      ODIFF_BIN: node_modules/.bin/odiff
    steps:
      - uses: actions/checkout@v4
        with:
          # Head branch (not the merge commit), so accept mode can push back to it.
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1.2"
          gleam-version: "1.14.0"
          rebar3-version: "3"
      - run: gleam format --check src test
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The only JS peer dependency is the odiff binary.
      - run: npm ci
      - run: gleam deps download
      # Renders go through chrome-headless-shell (exact viewport, no letterbox
      # band). It's a separate download from full Chrome; pull the pinned build
      # from Chrome-for-Testing via @puppeteer/browsers, whose install line ends
      # with the binary's absolute path.
      - name: Install chrome-headless-shell
        id: chrome
        run: |
          line=$(npx -y @puppeteer/browsers install "chrome-headless-shell@141.0.7390.37")
          echo "path=${line##* }" >> "$GITHUB_OUTPUT"
      # Run the suite on both targets — the library is fully dual-target.
      - name: Screenshot tests (Erlang)
        run: gleam test --target erlang
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.path }}
      - name: Screenshot tests (JavaScript)
        run: gleam test --target javascript
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.path }}
      - name: Commit accepted baselines
        if: ${{ success() && env.SCREENSHOT_ACCEPT == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- test/screenshots
          if ! git diff --cached --quiet; then
            git commit -m "Accept updated screenshots"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
      - name: Upload proposed screenshots and diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-proposals
          path: |
            **/*.new.png
            **/*.diff.png
          if-no-files-found: ignore
          retention-days: 14
