# This repo's own CI: render the fixtures and pixel-diff them against the
# committed baselines (the screenshot suite), plus a formatting check. There's no
# reusable workflow to call — consumers write their own job like the one below
# and run `gleam test`.
#
# Accepting is folded into the same job: while the `accept-screenshots` label is
# on the PR, the run goes into SCREENSHOT_ACCEPT mode (the library refreshes any
# baseline that drifted past the threshold) and the commit step pushes the
# result back. The label stays until removed, so every push keeps adopting. The
# regular run needs none of that — `gleam test` alone is the compare.

name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write # accept mode pushes the refreshed baselines
    steps:
      - uses: actions/checkout@v4
        with:
          # Head branch (not the merge commit), so accept mode can push back to it.
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1.2"
          gleam-version: "1.14.0"
          rebar3-version: "3"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # JS peer deps: odiff-bin (the diff binary) + linkedom (template injection),
      # both in package.json.
      - run: npm ci
      - run: gleam deps download
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: "131.0.6778.204"
      # Accept mode (refresh the baselines) whenever the label is on the PR;
      # otherwise this run is the compare.
      - run: gleam test
        env:
          SCREENSHOT_ACCEPT: ${{ contains(github.event.pull_request.labels.*.name, 'accept-screenshots') }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          ODIFF_BIN: node_modules/.bin/odiff
      - name: Commit accepted baselines
        if: ${{ success() && contains(github.event.pull_request.labels.*.name, 'accept-screenshots') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- test/screenshots
          if ! git diff --cached --quiet; then
            git commit -m "Accept updated screenshots"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
      - name: Upload proposed screenshots and diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-proposals
          path: |
            **/*.new.png
            **/*.diff.png
          if-no-files-found: ignore
          retention-days: 14

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1.2"
          gleam-version: "1.14.0"
          rebar3-version: "3"
      - run: gleam format --check src test
