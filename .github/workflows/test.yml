# CI for the gleam_screenshots library itself. It exercises the library
# end-to-end against the committed baselines in test/screenshots/, so it also
# serves as a worked example of the template in templates/screenshot-regression.yml.

name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1.2"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Installs linkedom (template injection) + odiff-bin (pixel diff).
      - run: npm ci

      - run: gleam deps download

      - run: gleam format --check src test

      # Pinned to the version the committed linux baselines were generated with.
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: "131.0.6778.204"

      - name: Run tests
        run: gleam test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          ODIFF_BIN: node_modules/.bin/odiff

      - name: Upload proposed screenshots and diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-proposals
          path: |
            test/screenshots/*.new.png
            test/screenshots/*.diff.png
          if-no-files-found: ignore
          retention-days: 14
