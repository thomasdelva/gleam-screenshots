# Reusable one-click accept workflow. Reference it from a label-triggered caller
# that grants write access — see the README "CI" section:
#
#   jobs:
#     accept:
#       if: github.event.label.name == 'accept-screenshots'
#       permissions:
#         contents: write
#         pull-requests: write
#       uses: thomasdelva/gleam-screenshots/.github/workflows/screenshots-accept.yml@main
#       with:
#         build-command: gleam run -m lustre/dev build --outdir=priv/static
#
# It re-renders in accept mode, commits the refreshed baselines to the PR branch,
# and removes the label. The CALLER's job must grant contents: write (and
# pull-requests: write to drop the label) — a called workflow can't escalate.

name: screenshots-accept

on:
  workflow_call:
    inputs:
      gleam-version:
        type: string
        default: "1.14.0"
      otp-version:
        type: string
        default: "27.1.2"
      node-version:
        type: string
        default: "22"
      chrome-version:
        type: string
        default: "131.0.6778.204"
      build-command:
        description: "Command that builds the assets your template links (e.g. CSS). Omit if none."
        type: string
        default: ""

jobs:
  accept:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The PR's head branch, so we can push the refreshed baselines back.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ inputs.otp-version }}
          gleam-version: ${{ inputs.gleam-version }}
          rebar3-version: "3"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - run: npm ci
      - run: gleam deps download

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: ${{ inputs.chrome-version }}

      - name: Build assets
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}

      # Accept mode: adopt the current render as every baseline; the suite passes.
      - name: Refresh baselines
        run: gleam test
        env:
          SCREENSHOT_ACCEPT: "true"
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          ODIFF_BIN: node_modules/.bin/odiff

      - name: Commit refreshed baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No baseline changes to accept."
          else
            git commit -m "Accept updated screenshots"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Remove the accept-screenshots label
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'accept-screenshots',
            }).catch(() => {});
