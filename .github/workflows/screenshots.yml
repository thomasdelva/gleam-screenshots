# Reusable screenshot workflow. Reference it with `uses:` — no copy-paste — see
# the README "CI" section.
#
# Regular run (compare against baselines; needs no permissions):
#   jobs:
#     screenshots:
#       uses: thomasdelva/gleam-screenshots/.github/workflows/screenshots.yml@main
#       with:
#         build-command: gleam run -m lustre/dev build --outdir=priv/static
#
# One-click accept (refresh baselines + push them back; gate it and grant write):
#   jobs:
#     accept:
#       if: github.event.label.name == 'accept-screenshots'
#       permissions:
#         contents: write       # push the refreshed baselines
#         pull-requests: write  # drop the label afterwards
#       uses: thomasdelva/gleam-screenshots/.github/workflows/screenshots.yml@main
#       with:
#         accept: true
#         build-command: gleam run -m lustre/dev build --outdir=priv/static
#
# `accept` defaults to false, so a normal call never pushes and needs no
# permissions. The commit/label steps below are simply skipped unless accept is on.

name: screenshots

on:
  workflow_call:
    inputs:
      accept:
        description: "Accept mode: adopt current renders as baselines and push them back, instead of comparing."
        type: boolean
        default: false
      gleam-version:
        type: string
        default: "1.14.0"
      otp-version:
        type: string
        default: "27.1.2"
      node-version:
        type: string
        default: "22"
      chrome-version:
        type: string
        default: "131.0.6778.204"
      build-command:
        description: "Command that builds the assets your template links (e.g. CSS). Omit if none."
        type: string
        default: ""
      threshold:
        description: "odiff per-pixel colour threshold (e.g. 0.2) applied to the whole run. Empty = the per-test default (0.1)."
        type: string
        default: ""

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The PR's head branch, so accept mode can push baselines back to it.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ inputs.otp-version }}
          gleam-version: ${{ inputs.gleam-version }}
          rebar3-version: "3"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      # Installs the JS peer deps the library shells out to: odiff-bin (the diff
      # binary) and linkedom (template injection). Put both in package.json.
      - run: npm ci

      - run: gleam deps download

      - run: gleam format --check src test

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: ${{ inputs.chrome-version }}

      - name: Build assets
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}

      # Compare mode fails on a regression; accept mode refreshes baselines and passes.
      - name: Run screenshot tests
        run: gleam test
        env:
          SCREENSHOT_ACCEPT: ${{ inputs.accept }}
          SCREENSHOT_THRESHOLD: ${{ inputs.threshold }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          ODIFF_BIN: node_modules/.bin/odiff

      # Accept mode only: push the refreshed baselines back to the branch.
      # Note: this pushes with the default GITHUB_TOKEN, and GitHub does not
      # re-trigger workflows on GITHUB_TOKEN pushes — so the regression check
      # won't re-run itself. Re-run it manually, or check out above with a PAT
      # (`token:`) here to make CI self-heal to green.
      - name: Commit refreshed baselines
        if: ${{ inputs.accept }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No baseline changes to accept."
          else
            git commit -m "Accept updated screenshots"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Remove the accept-screenshots label
        if: ${{ inputs.accept && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'accept-screenshots',
            }).catch(() => {});

      # Compare mode only: surface the proposed screenshots + diffs on a regression.
      - name: Upload proposed screenshots and diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-proposals
          path: |
            **/*.new.png
            **/*.diff.png
          if-no-files-found: ignore
          retention-days: 14
