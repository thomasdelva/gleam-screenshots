# Reusable screenshot-regression workflow. Reference it from your repo — no
# copy-paste — see the README "CI" section:
#
#   jobs:
#     screenshots:
#       uses: thomasdelva/gleam-screenshots/.github/workflows/screenshots.yml@main
#       with:
#         build-command: gleam run -m lustre/dev build --outdir=priv/static
#
# On a visual regression it fails the build and uploads the proposed screenshots
# + diffs as an artifact for review; it never overwrites the baseline.

name: screenshots

on:
  workflow_call:
    inputs:
      gleam-version:
        type: string
        default: "1.14.0"
      otp-version:
        type: string
        default: "27.1.2"
      node-version:
        type: string
        default: "22"
      chrome-version:
        type: string
        default: "131.0.6778.204"
      build-command:
        description: "Command that builds the assets your template links (e.g. CSS). Omit if none."
        type: string
        default: ""

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ inputs.otp-version }}
          gleam-version: ${{ inputs.gleam-version }}
          rebar3-version: "3"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      # Installs the JS peer deps the library shells out to: odiff-bin (the diff
      # binary) and linkedom (template injection). Put both in package.json.
      - run: npm ci

      - run: gleam deps download

      - run: gleam format --check src test

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: ${{ inputs.chrome-version }}

      - name: Build assets
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}

      - name: Run tests (incl. screenshot regression)
        run: gleam test
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          ODIFF_BIN: node_modules/.bin/odiff

      - name: Upload proposed screenshots and diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-proposals
          path: |
            **/*.new.png
            **/*.diff.png
          if-no-files-found: ignore
          retention-days: 14
