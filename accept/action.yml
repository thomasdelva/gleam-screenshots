name: Commit accepted screenshots
description: >-
  Commit the refreshed screenshot baselines and push them back, then drop the
  trigger label. Use it as a label-gated step right after a SCREENSHOT_ACCEPT
  run of `gleam test` has re-rendered the baselines — this action just does the
  commit-push-and-unlabel part. The job must check out the head branch and grant
  `contents: write` + `pull-requests: write`.

inputs:
  paths:
    description: "Pathspec of baselines to stage for the accept commit."
    default: "."
  label:
    description: "Label to remove after accepting. Empty to skip."
    default: "accept-screenshots"

runs:
  using: composite
  steps:
    - name: Commit and push refreshed baselines
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A -- ${{ inputs.paths }}
        if git diff --cached --quiet; then
          echo "No baseline changes to accept."
        else
          git commit -m "Accept updated screenshots"
          git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
        fi

    - name: Remove the accept label
      if: ${{ inputs.label != '' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        ACCEPT_LABEL: ${{ inputs.label }}
      with:
        script: |
          await github.rest.issues.removeLabel({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            name: process.env.ACCEPT_LABEL,
          }).catch(() => {});
